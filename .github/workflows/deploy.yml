name: CI-CD Wentask

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # LOGIN DOCKER HUB
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BUILD BACKEND
      - name: Build backend image
        run: |
          docker build -t ismak07/wentask-backend:v1 ./wentask-backend
          docker push ismak07/wentask-backend:v1

      # BUILD FRONTEND
      - name: Build frontend image
        run: |
          docker build -t ismak07/wentask-frontend:v1 ./wentask-frontend
          docker push ismak07/wentask-frontend:v1