name: CI-CD Wentask

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Récupérer le projet
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build backend image
      - name: Build backend image
        run: |
          docker build -t ismak07/wentask-backend:v1 ./wentask-backend

      # 4. Push backend image
      - name: Push backend image
        run: |
          docker push ismak07/wentask-backend:v1

      # 5. Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ismak07/wentask-frontend:v1 ./wentask-frontend

      # 6. Push frontend image
      - name: Push frontend image
        run: |
          docker push ismak07/wentask-frontend:v1
