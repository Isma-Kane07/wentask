apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: wentask

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: ismak07/wentask-frontend:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 80