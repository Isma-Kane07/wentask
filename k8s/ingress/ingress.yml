apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wentask-ingress
  namespace: wentask
spec:
  rules:
    - host: wentask.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80